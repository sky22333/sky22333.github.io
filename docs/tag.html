<style>
*{box-sizing:border-box;}
html{scroll-behavior:smooth;background-color:var(--bgColor-muted,#f6f8fa);background-image:linear-gradient(rgba(27,31,36,.032) 1px,transparent 1px),linear-gradient(90deg,rgba(27,31,36,.032) 1px,transparent 1px);background-size:32px 32px;}
html[data-color-mode="dark"]{background-color:var(--bgColor-muted,#2d333b);background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);}
body{min-width:200px;max-width:900px;margin:20px auto;padding:45px;font-size:16px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;line-height:1.6;color:var(--fgColor-default,var(--color-fg-default));background:transparent;}
a{transition:color .18s ease,background-color .18s ease,border-color .18s ease,box-shadow .18s ease;}
#header{display:flex;align-items:center;gap:16px;min-width:0;padding-bottom:20px;border-bottom:1px solid var(--borderColor-muted,var(--color-border-muted));margin-bottom:24px;}
#content{min-width:0;}
#footer{margin-top:56px;padding-top:24px;border-top:1px solid var(--borderColor-muted,var(--color-border-muted));text-align:center;font-size:13px;color:var(--fgColor-muted,var(--color-fg-muted));}
#footer a{color:inherit;}
.title-right{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-left:auto;flex-shrink:0;}
.title-right .circle{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;padding:0;margin:0;border-radius:50%;}
.page-title{min-width:0;margin:0;font-size:clamp(26px,5vw,42px);line-height:1.12;font-weight:700;letter-spacing:0;}
.muted-text{color:var(--fgColor-muted,var(--color-fg-muted));}
.page-subtitle{margin:0 0 18px;color:var(--fgColor-muted,var(--color-fg-muted));}
.SideNav{min-width:0;overflow:hidden;border-radius:8px;background:var(--bgColor-default,var(--color-canvas-default));}
.SideNav.border{border-color:var(--borderColor-muted,var(--color-border-muted))!important;}
.SideNav-item{gap:12px;padding:13px 14px;min-height:52px;transition:background-color .18s ease;}
.SideNav-item:hover{background:var(--bgColor-muted,var(--color-canvas-subtle));}
.SideNav-item>.d-flex{min-width:0;}
.SideNav-icon{flex:0 0 auto;margin-right:12px;color:var(--fgColor-muted,var(--color-fg-muted));}
.listTitle{min-width:0;max-width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:500;}
.listLabels{display:flex;align-items:center;justify-content:flex-end;gap:6px;min-width:0;white-space:nowrap;flex-shrink:0;}
.listLabels object{max-height:18px;max-width:28px;}
.Label{border-radius:999px;padding:2px 8px;color:#fff;font-size:12px;line-height:18px;font-weight:500;}
.Label a{color:#fff;text-decoration:none;}
.LabelTime{font-variant-numeric:tabular-nums;}
.markdown-body{font-size:16px;line-height:1.72;}
.markdown-body img{border-radius:8px;}
.markdown-body table img{border-radius:6px;}
.btn{transition:background-color .18s ease,border-color .18s ease,box-shadow .18s ease,transform .18s ease;}
.btn:hover{transform:translateY(-1px);}
@media (max-width:600px){
    body{padding:8px;}
    #header{align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding-bottom:16px;}
    .title-right .circle{width:36px;height:36px;}
    .LabelTime{display:none;}
}
</style>

<style>
.tagTitle{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.subnav-search{display:flex;align-items:center;width:min(320px,100%);margin-right:4px;}
.subnav-search-input{width:100%;height:36px;border-top-right-radius:0;border-bottom-right-radius:0;}
.subnav-search button{height:36px;padding:5px 12px;border-top-left-radius:0;border-bottom-left-radius:0;}
#taglabel{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
#taglabel .Label{border:0;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease;}
#taglabel .Label:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(140,149,159,.22);}
.Counter{margin-left:6px;color:#fff;background-color:rgba(255,255,255,.24);}
.notFind{display:none;margin:24px 0;padding:22px;border:1px dashed var(--borderColor-muted,var(--color-border-muted));border-radius:8px;color:var(--fgColor-muted,var(--color-fg-muted));text-align:center;font-size:16px;}
@media (max-width: 600px) {
    .tagTitle{display:none;}
    .subnav-search{width:100%;}
}
</style>

var utterancesLoad=0;

let themeSettings={
    "dark": ["dark","moon","#00f0ff","dark-blue"],
    "light": ["light","sun","#ff5000","github-light"],
    "auto": ["auto","sync","","preferred-color-scheme"]
};
function changeTheme(mode, icon, color, utheme){
    document.documentElement.setAttribute("data-color-mode",mode);
    document.getElementById("themeSwitch").setAttribute("d",value=IconList[icon]);
    document.getElementById("themeSwitch").parentNode.style.color=color;
    if(utterancesLoad==1){utterancesTheme(utheme);}
}
function modeSwitch(){
    let currentMode=document.documentElement.getAttribute('data-color-mode');
    let newMode = currentMode === "light" ? "dark" : currentMode === "dark" ? "auto" : "light";
    localStorage.setItem("meek_theme", newMode);
    if(themeSettings[newMode]){
        changeTheme(...themeSettings[newMode]);
    }
}
function utterancesTheme(theme){
    const message={type:'set-theme',theme: theme};
    const iframe=document.getElementsByClassName('utterances-frame')[0];
    iframe.contentWindow.postMessage(message,'https://utteranc.es');
}

<script>
document.getElementById("pathHome").setAttribute("d",IconList["home"]);
document.getElementById("searchSVG").setAttribute("d",IconList["search"]);

tagList=[];
labelsCount={};
jsonData='';
let requestJson="postList.json"
let request=new XMLHttpRequest();
request.open("GET",requestJson);
request.responseType='text';
request.send();
request.onload=function(){
    jsonData=JSON.parse(request.response);
    console.log(jsonData);
    showList(labelsCount);
    setClassDisplay(decodeURI(window.location.hash.slice(1)));
}

function showList(labelsCount){
    let SideNav=document.getElementsByClassName("SideNav")[0];
    SideNav.classList.add("border");
    let taglabel=document.getElementById("taglabel");

    jsonData['labelColorDict']["All"]="#000";
    labelsCount["All"]=0;
    for (let key in jsonData) {
        if (key !== 'labelColorDict' && Array.isArray(jsonData[key]['labels'])) {
            labelsCount["All"]++;
            for (let label of jsonData[key]['labels']) {
                labelsCount[label] = (labelsCount[label] || 0) + 1;
            }
        }
    }

    let sortedLabelsList = Object.keys(labelsCount).sort((a, b) => labelsCount[b] - labelsCount[a]);
    for (let label of sortedLabelsList) {
        tagList.push(label);
        let showLabels = document.createElement("button");
        showLabels.setAttribute("class", "Label");
        showLabels.setAttribute("style", "background-color:" + jsonData['labelColorDict'][label]);
        showLabels.innerHTML="&nbsp;&nbsp;"+label+" ";
        showLabels.setAttribute("onclick", "javascript:updateShowTag('" + label + "');");

        let LabelNum=document.createElement("span");
        LabelNum.setAttribute("class","Counter");
        LabelNum.innerHTML=labelsCount[label];
        showLabels.appendChild(LabelNum);
        taglabel.appendChild(showLabels);
    }

    for(i in jsonData){
        if(i!='labelColorDict'){
            let div=document.createElement("div");
            div.setAttribute("class","lists "+jsonData[i]['labels'].join(" "));
            let item=document.createElement("a");
            item.setAttribute("class","SideNav-item d-flex flex-items-center flex-justify-between");
            item.setAttribute("href",jsonData[i]['postUrl']);

            let center=document.createElement("div");
            center.setAttribute("class","d-flex flex-items-center");

            svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
            path=document.createElementNS("http://www.w3.org/2000/svg","path"); 
            span=document.createElement("span");
            svg.setAttributeNS(null,"class","SideNav-icon octicon");
            svg.setAttributeNS(null,"style","width:16px;height:16px");
            path.setAttributeNS(null, "d", IconList["post"]);
            svg.appendChild(path);

            let title=document.createElement("span");
            title.setAttribute("class","listTitle");
            title.innerHTML=jsonData[i]['postTitle'];
            center.appendChild(svg);
            center.appendChild(title);

            let listLabels=document.createElement("div");
            listLabels.setAttribute("class","listLabels");
            
            for(label of jsonData[i]['labels']){
                let LabelName=document.createElement("span");
                LabelName.setAttribute("class","Label LabelName");
                LabelName.setAttribute("style","background-color:"+jsonData['labelColorDict'][label]);
                LabelName.innerHTML=label;
                listLabels.appendChild(LabelName);
            }
            let LabelTime=document.createElement("span");
            LabelTime.setAttribute("class","Label LabelTime");
            LabelTime.setAttribute("style","background-color:"+jsonData[i]['dateLabelColor']);
            LabelTime.innerHTML=jsonData[i]['createdDate'];
            listLabels.appendChild(LabelTime);

            item.appendChild(center);
            item.appendChild(listLabels);
            div.appendChild(item);
            SideNav.appendChild(div);
        }
    }
}

function updateShowTag(label){
    if(window.location.hash.slice(1)!=encodeURI(label)){
        window.location.hash="#"+(label);
        setClassDisplay(label);
    }
}

function setClassDisplay(label){
    let lists = document.getElementsByClassName("lists");
    let tagTitle = document.getElementsByClassName("tagTitle")[0];
    tagTitle.innerHTML="Tag #"+label;
    document.title=label+" - 繁星点点";
    document.getElementsByClassName("subnav-search-input")[0].value='';
    if(label=="All"){
        for(let i = 0; i < lists.length; i++){lists[i].style.display='block';}
        document.getElementsByClassName("notFind")[0].style.display='none';
    }
    else if(tagList.indexOf(label)!=-1){
        for(let i = 0; i < lists.length; i++){
            lists[i].style.display='none';
        }

        let labels = document.getElementsByClassName(label);
        for(let i = 0; i < labels.length; i++){
            labels[i].style.display='block';
        }
        document.getElementsByClassName("notFind")[0].style.display='none';
    }
    else{
        document.getElementsByClassName("subnav-search-input")[0].value=label;
        searchShow();
    }
}

function searchShow(){
    let lists = document.getElementsByClassName("lists");
    let tagTitle = document.getElementsByClassName("tagTitle")[0];
    let searchInput = document.getElementsByClassName("subnav-search-input")[0].value;
    tagTitle.innerHTML="Search #"+searchInput;
    if(searchInput==''){document.title="Search - 繁星点点";}
    else{document.title=searchInput+" - 繁星点点";}
    let a=0;
    window.location.hash="#"+(searchInput);
    for(let i = 0; i < lists.length; i++){
        if(lists[i].childNodes[0].childNodes[0].childNodes[1].innerHTML.toUpperCase().indexOf(searchInput.toUpperCase())==-1){lists[i].style.display='none';}
        else{lists[i].style.display='block';a=a+1;}
    }
    if(a==0){
        let notFind=document.getElementsByClassName("notFind")[0];
        notFind.style.display='block';
        notFind.innerHTML='Not Find "'+searchInput+'"';
    }
    else{document.getElementsByClassName("notFind")[0].style.display='none';}
}

</script>
